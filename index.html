<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sugar0verdosed</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="desktop flex">

        <img id="sugar" src="/assets/art/Sugar-4-(Jul-5-2026).png" style="transform: scaleX(-1); margin-left: -170px;">

        <div class="window main-content flex">
            <div class=" window-title flex">
                <span>🌈 HOME</span>
                <div class="window-close">X</div>
            </div>

            <div class="window-body flex column">
                <marquee behavior="scroll" direction="left" scrollamount="4">Moving inline styles...</marquee>
                <div class="flex" style="height: 100%;">
                    <div id="desktop-grid">
                        <a href="javascript:void(0)" class="app flex column"
                            onclick="toggleWindow('window-chat');playOpen();">
                            <span class="app-icon">💬</span>
                            <span class="app-name" style="background: red; color: white;">chat.exe</span>
                        </a>
                    </div>
                    <div id="sidebar" class="flex column">
                        <div class="window">
                            <div class="window-title flex">
                                <span>BLOG</span>
                                <div class="window-close">X</div>
                            </div>
                            <div class="window-popup-content" id="latest-post-content">
                                Loading...
                            </div>
                        </div>

                        <audio id="audio-engine" src=""></audio>

                        <div id="player-track-title">
                            TRACK:
                        </div>

                        <div id="player-track-menu" class="flex" style="gap: 6px; justify-content: center;">
                            <button onclick="controlAudio('play')"
                                style="background: cyan; border: 2px outset #00bfff;">►
                                PLAY</button>
                            <button onclick="controlAudio('pause')"
                                style="background: yellow; border: 2px outset #ffd700;">Ⅱ
                                PAUSE</button>
                            <button onclick="controlAudio('stop')"
                                style="background: red; border: 2px outset #ff0000; color: white;">■
                                STOP</button>
                        </div>

                        <div id="player-track" class="flex">
                            <div class="playlist-track" onclick="playSong('＋♂', '/assets/audio/music/plus-boy.mp3')">01.
                                ＋♂</div>
                            <div class="playlist-track"
                                onclick="playSong('Chiwawa', '/assets/audio/music/Chiwawa.mp3')">02.
                                Chiwawa</div>
                            <div class="playlist-track"
                                onclick="playSong('ELECTRIC WEEKEND ZONE', '/assets/audio/music/ELECTRIC WEEKEND ZONE.mp3')">
                                03. ELECTRIC WEEKEND ZONE</div>
                            <div class="playlist-track"
                                onclick="playSong('INTERNET OVERDOSE', '/assets/audio/music/INTERNET OVERDOSE.mp3')">04.
                                INTERNET OVERDOSE</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <img id="sugar" src="/assets/art/Sugar-4-(Jul-5-2026).png" style="margin-right: -170px;">

        <div id="window-chat" class="window window-popup hidden flex" style="width: 280px; border: 4px solid red;">
            <div class="window-title flex" style="background: red;">
                <span>Chat
                    <span id="online-status" style="color: lime; animation: blinker 1.5s linear infinite;">🟢
                        ONLINE</span>
                </span>
                <div class="window-close" onclick="toggleWindow('window-chat')">X</div>
            </div>

            <div id="chat-window-body" class="window-popup-content flex column">
                <div class="flex"
                    style="padding: 0 0 10px; flex-direction: column; gap: 6px; font-size: 0.75rem; font-weight: bold;">
                    <div class="flex" style="align-items: center; justify-content: space-between; gap: 8px;">
                        <span style="color: red; width: 65px;">STRESS:</span>
                        <div style="flex: 1; height: 12px; background: #eee; border: 1px solid red;">
                            <div id="meter-stress" style="height: 100%; background: red; width: 0%;"></div>
                        </div>
                        <span id="txt-stress" style="width: 30px; text-align: right;">0%</span>
                    </div>
                    <div class="flex" style="align-items: center; justify-content: space-between; gap: 8px;">
                        <span style="color: hotpink; width: 65px;">AFFECTION:</span>
                        <div style="flex: 1; height: 12px; background: #eee; border: 1px solid red;">
                            <div id="meter-affection" style="height: 100%; background: hotpink; width: 0%;"></div>
                        </div>
                        <span id="txt-affection" style="width: 30px; text-align: right; color: hotpink;">0%</span>
                    </div>
                </div>

                <div class="avatar-container" style="text-align: center;">
                    <img id="sugar-avatar" src="/assets/art/SUGARWIP.png" alt="[SUGAR-CHAN GRAPHIC]"
                        onclick="handleSugarClick()"
                        style="max-width: 100%; max-height: 170px; object-fit: cover; cursor: pointer;">
                </div>
                <div class="dialogue-text-box" id="dialogue-box">
                    Loading...
                </div>
                <div class="options-container flex" id="options-box" style="flex-direction: column; gap: 4px;">
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
